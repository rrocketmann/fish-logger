{% extends "base.html" %}

{% block title %}Submit Catch - Fish Logger{% endblock %}

{% block content %}
<div class="hero">
    <h1>Submit Catch Data</h1>
    <p>Upload a fish photo and provide details for our research database</p>
</div>

<div class="upload-form">
    <form method="POST" enctype="multipart/form-data">
        <div class="form-group">
            <label for="fish_image">Photo *</label>
            <input type="file" id="fish_image" name="fish_image" accept="image/*" required>
        </div>
        
        <div class="form-group">
            <label for="species_label">Species (if known)</label>
            <input type="text" id="species_label" name="species_label" 
                   placeholder="e.g., Trout, Sea Bass, or 'Unknown'">
        </div>
        
        <div class="form-group">
            <label for="uploader_name">Your Name *</label>
            <input type="text" id="uploader_name" name="uploader_name" 
                   placeholder="Fisher or researcher name" required>
        </div>
        
        <div class="form-group">
            <label for="location">Location</label>
            <input type="text" id="location" name="location" 
                   placeholder="Coordinates or location name">
        </div>
        
        <div class="form-group">
            <label for="notes">Notes</label>
            <textarea id="notes" name="notes" 
                      placeholder="Size, depth, conditions, etc."></textarea>
        </div>
        
        <button type="submit" class="btn btn-primary">Submit to Database</button>
    </form>
</div>

<style>
    .upload-form {
        max-width: 600px;
        margin: 0 auto;
        background-color: #e8f5e8;
        border: 3px solid #d4f1d4;
        padding: 40px;
    }
    
    .form-group {
        margin-bottom: 25px;
    }
    
    .form-group label {
        display: block;
        margin-bottom: 10px;
        font-weight: 600;
        color: #1a3a1a;
    }
    
    .form-group input[type="file"],
    .form-group input[type="text"],
    .form-group textarea {
        width: 100%;
        padding: 12px;
        border: 2px solid #b8e6b8;
        background-color: white;
        font-size: 16px;
        color: #1a3a1a;
    }
    
    .form-group textarea {
        min-height: 100px;
        resize: vertical;
    }
    
    .btn-primary {
        width: 100%;
        padding: 18px;
        background-color: #b8e6b8;
        border: 3px solid #7cb87c;
        color: #1a3a1a;
        font-size: 18px;
        font-weight: bold;
        cursor: pointer;
        transition: background-color 0.3s;
    }
    
    .btn-primary:hover {
        background-color: #7cb87c;
        color: white;
    }
</style>
{% endblock %}
