{% extends "base.html" %}

{% block title %}Upload - Fish Logger{% endblock %}

{% block content %}
<h1 style="font-size: 36px; margin-bottom: 30px;">Upload Fish Photo</h1>

<div class="card" style="max-width: 700px; margin: 0 auto;">
    <form method="POST" enctype="multipart/form-data">
        <div class="form-group">
            <label for="fish_image">Photo *</label>
            <input type="file" id="fish_image" name="fish_image" accept="image/*" required>
        </div>
        
        <div class="form-group">
            <label for="species_label">Species *</label>
            <input type="text" id="species_label" name="species_label" 
                   placeholder="e.g., Trout, Sea Bass, Red Mullet" required>
        </div>
        
        <div class="form-group">
            <label for="uploader_name">Name *</label>
            <input type="text" id="uploader_name" name="uploader_name" 
                   placeholder="Your name" required>
        </div>
        
        <div class="form-group">
            <label for="location">Location</label>
            <input type="text" id="location" name="location" 
                   placeholder="Optional">
        </div>
        
        <div class="form-group">
            <label for="notes">Notes</label>
            <textarea id="notes" name="notes" 
                      placeholder="Optional"></textarea>
        </div>
        
        <button type="submit" class="btn" style="width: 100%;">Upload</button>
    </form>
</div>

<div style="text-align: center; margin-top: 30px;">
    <a href="{{ url_for('community') }}" class="btn btn-secondary">View Gallery</a>
</div>
{% endblock %}
