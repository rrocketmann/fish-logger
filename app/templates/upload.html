<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Submit Catch - Fish Logger</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif;
            background-color: #fafffa;
            color: #1a3a1a;
        }
        
        .container {
            max-width: 800px;
            margin: 0 auto;
            padding: 20px;
        }
        
        .title {
            text-align: center;
            font-size: 48px;
            font-weight: bold;
            color: #1a3a1a;
            margin: 40px 0;
        }
        
        .main-box {
            background-color: #e8f5e8;
            border: 3px solid #d4f1d4;
            padding: 40px;
            margin-bottom: 30px;
        }
        
        .form-group {
            margin-bottom: 25px;
        }
        
        .form-group label {
            display: block;
            margin-bottom: 10px;
            font-weight: 600;
            color: #1a3a1a;
        }
        
        .form-group input[type="file"],
        .form-group input[type="text"],
        .form-group textarea {
            width: 100%;
            padding: 12px;
            border: 2px solid #b8e6b8;
            background-color: white;
            font-size: 16px;
            color: #1a3a1a;
        }
        
        .form-group textarea {
            min-height: 100px;
            resize: vertical;
        }
        
        .btn-primary {
            width: 100%;
            padding: 18px;
            background-color: #b8e6b8;
            border: 3px solid #7cb87c;
            color: #1a3a1a;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            transition: background-color 0.3s;
        }
        
        .btn-primary:hover {
            background-color: #7cb87c;
            color: white;
        }
        
        .btn-secondary {
            padding: 15px 30px;
            background-color: #e8f5e8;
            border: 2px solid #b8e6b8;
            color: #1a3a1a;
            font-size: 16px;
            font-weight: 600;
            text-decoration: none;
            display: inline-block;
            cursor: pointer;
            transition: background-color 0.3s;
        }
        
        .btn-secondary:hover {
            background-color: #b8e6b8;
        }
        
        .back-link {
            text-align: center;
            margin-top: 20px;
        }
        
        .alert {
            padding: 15px;
            margin-bottom: 20px;
            border: 2px solid;
        }
        
        .alert-success {
            background-color: #e8f5e8;
            border-color: #b8e6b8;
            color: #1a3a1a;
        }
        
        .alert-error {
            background-color: #ffd4d4;
            border-color: #ffb3b3;
            color: #4a0000;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1 class="title">Fish Logger</h1>
        
        {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
                {% for category, message in messages %}
                    <div class="alert alert-{{ category }}">{{ message }}</div>
                {% endfor %}
            {% endif %}
        {% endwith %}
        
        <div class="main-box">
            <h2 style="font-size: 24px; margin-bottom: 30px; text-align: center;">Submit Catch Data</h2>
            
            <form method="POST" enctype="multipart/form-data">
                <div class="form-group">
                    <label for="fish_image">Photo *</label>
                    <input type="file" id="fish_image" name="fish_image" accept="image/*" required>
                </div>
                
                <div class="form-group">
                    <label for="species_label">Species (if known)</label>
                    <input type="text" id="species_label" name="species_label" 
                           placeholder="e.g., Trout, Sea Bass, or 'Unknown'">
                </div>
                
                <div class="form-group">
                    <label for="uploader_name">Your Name *</label>
                    <input type="text" id="uploader_name" name="uploader_name" 
                           placeholder="Fisher or researcher name" required>
                </div>
                
                <div class="form-group">
                    <label for="location">Location</label>
                    <input type="text" id="location" name="location" 
                           placeholder="Coordinates or location name">
                </div>
                
                <div class="form-group">
                    <label for="notes">Notes</label>
                    <textarea id="notes" name="notes" 
                              placeholder="Size, depth, conditions, etc."></textarea>
                </div>
                
                <button type="submit" class="btn-primary">Submit to Database</button>
            </form>
        </div>
        
        <div class="back-link">
            <a href="{{ url_for('index') }}" class="btn-secondary">← Back to Home</a>
        </div>
    </div>
</body>
</html>
