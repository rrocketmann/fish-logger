{% extends "base.html" %}

{% block title %}Upload Fish Photo - Fish Logger{% endblock %}

{% block content %}
<h1 style="font-size: 36px; margin-bottom: 30px;">Upload a Fish Photo</h1>

<div class="card" style="max-width: 700px; margin: 0 auto;">
    <form method="POST" enctype="multipart/form-data">
        <div class="form-group">
            <label for="fish_image">Fish Photo *</label>
            <input type="file" id="fish_image" name="fish_image" accept="image/*" required>
        </div>
        
        <div class="form-group">
            <label for="species_label">Fish Species *</label>
            <input type="text" id="species_label" name="species_label" 
                   placeholder="e.g., Trout, Sea Bass, Red Mullet" required>
        </div>
        
        <div class="form-group">
            <label for="uploader_name">Your Name *</label>
            <input type="text" id="uploader_name" name="uploader_name" 
                   placeholder="Your name or username" required>
        </div>
        
        <div class="form-group">
            <label for="location">Location (Optional)</label>
            <input type="text" id="location" name="location" 
                   placeholder="e.g., Pacific Ocean, Lake Michigan">
        </div>
        
        <div class="form-group">
            <label for="notes">Notes (Optional)</label>
            <textarea id="notes" name="notes" 
                      placeholder="Any additional information about this fish..."></textarea>
        </div>
        
        <button type="submit" class="btn" style="width: 100%;">Upload Fish Photo</button>
    </form>
</div>

<div style="text-align: center; margin-top: 30px;">
    <a href="{{ url_for('community') }}" class="btn btn-secondary">View Community Gallery</a>
</div>
{% endblock %}
