<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Fish Logger{% endblock %}</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif;
            background-color: #fafffa;
            color: #1a3a1a;
            line-height: 1.6;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
            padding: 20px;
        }

        .title {
            text-align: center;
            font-size: 42px;
            font-weight: bold;
            color: #1a3a1a;
            margin: 32px 0;
        }

        .button-group {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-top: 20px;
        }

        .btn {
            display: block;
            text-align: center;
            padding: 15px;
            background-color: #e8f5e8;
            border: 2px solid #b8e6b8;
            color: #1a3a1a;
            text-decoration: none;
            font-weight: 600;
            transition: background-color 0.3s;
        }

        .btn:hover {
            background-color: #b8e6b8;
        }

        .alert {
            padding: 15px;
            margin-bottom: 20px;
            border: 2px solid;
        }

        .alert-success {
            background-color: #e8f5e8;
            border-color: #b8e6b8;
            color: #1a3a1a;
        }

        .alert-error {
            background-color: #ffd4d4;
            border-color: #ffb3b3;
            color: #4a0000;
        }

    </style>
</head>
<body>
    <div class="container">
        <h1 class="title">Fish Logger</h1>

        {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
                {% for category, message in messages %}
                    <div class="alert alert-{{ category }}">{{ message }}</div>
                {% endfor %}
            {% endif %}
        {% endwith %}

        {% block content %}{% endblock %}
    </div>
</body>
</html>
