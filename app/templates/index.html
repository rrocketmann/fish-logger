<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fish Logger</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif;
            background-color: #fafffa;
            color: #1a3a1a;
        }
        
        .container {
            max-width: 800px;
            margin: 0 auto;
            padding: 20px;
        }
        
        .title {
            text-align: center;
            font-size: 48px;
            font-weight: bold;
            color: #1a3a1a;
            margin: 40px 0;
        }
        
        .main-box {
            background-color: #e8f5e8;
            border: 3px solid #d4f1d4;
            padding: 40px;
            margin-bottom: 30px;
        }
        
        .main-box h2 {
            font-size: 24px;
            color: #1a3a1a;
            margin-bottom: 20px;
            text-align: center;
        }
        
        .upload-form {
            margin-top: 20px;
        }
        
        .form-group {
            margin-bottom: 25px;
        }
        
        .form-group label {
            display: block;
            margin-bottom: 10px;
            font-weight: 600;
            color: #1a3a1a;
        }
        
        .form-group input[type="file"] {
            width: 100%;
            padding: 12px;
            border: 2px solid #b8e6b8;
            background-color: white;
        }

        .form-group input[type="file"]::file-selector-button {
            margin-right: 12px;
            padding: 10px 14px;
            background-color: #e8f5e8;
            border: 2px solid #b8e6b8;
            color: #1a3a1a;
            font-weight: 600;
            cursor: pointer;
        }

        .form-group input[type="file"]::-webkit-file-upload-button {
            margin-right: 12px;
            padding: 10px 14px;
            background-color: #e8f5e8;
            border: 2px solid #b8e6b8;
            color: #1a3a1a;
            font-weight: 600;
            cursor: pointer;
        }

        .preview-box {
            margin-top: 16px;
            padding: 12px;
            background-color: white;
            border: 2px solid #d4f1d4;
        }

        .preview-box p {
            font-weight: 600;
            margin-bottom: 8px;
            color: #1a3a1a;
        }

        .preview-image {
            width: 100%;
            max-height: 300px;
            object-fit: contain;
            border: 2px solid #b8e6b8;
            background-color: #fafffa;
        }
        
        .btn-primary {
            width: 100%;
            padding: 18px;
            background-color: #b8e6b8;
            border: 3px solid #7cb87c;
            color: #1a3a1a;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            transition: background-color 0.3s;
        }
        
        .btn-primary:hover {
            background-color: #7cb87c;
            color: white;
        }
        
        .button-group {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }
        
        .btn-secondary {
            padding: 15px;
            background-color: #e8f5e8;
            border: 2px solid #b8e6b8;
            color: #1a3a1a;
            font-size: 16px;
            font-weight: 600;
            text-decoration: none;
            display: block;
            text-align: center;
            cursor: pointer;
            transition: background-color 0.3s;
        }
        
        .btn-secondary:hover {
            background-color: #b8e6b8;
        }
        
        .alert {
            padding: 15px;
            margin-bottom: 20px;
            border: 2px solid;
        }
        
        .alert-success {
            background-color: #e8f5e8;
            border-color: #b8e6b8;
            color: #1a3a1a;
        }
        
        .alert-error {
            background-color: #ffd4d4;
            border-color: #ffb3b3;
            color: #4a0000;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1 class="title">Fish Logger</h1>
        
        {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
                {% for category, message in messages %}
                    <div class="alert alert-{{ category }}">{{ message }}</div>
                {% endfor %}
            {% endif %}
        {% endwith %}
        
        <div class="main-box">
            <h2>Upload Photo for Identification</h2>
            <form method="POST" action="{{ url_for('identify') }}" enctype="multipart/form-data" class="upload-form">
                <div class="form-group">
                    <label for="fish_image">Fish Photo</label>
                    <input type="file" id="fish_image" name="fish_image" accept="image/*" required>

                    <div id="preview-box" class="preview-box" style="display: none;">
                        <p>Selected Image Preview</p>
                        <img id="preview-image" class="preview-image" alt="Selected fish image preview">
                    </div>
                </div>
                
                <button type="submit" class="btn-primary">Analyze Fish Photo</button>
            </form>
        </div>
        
        <div class="button-group">
            <a href="{{ url_for('upload') }}" class="btn-secondary">Submit to Database</a>
            <a href="/export/json" class="btn-secondary" download>Download Database</a>
        </div>
    </div>

    <script>
        const identifyInput = document.getElementById('fish_image');
        const identifyPreviewBox = document.getElementById('preview-box');
        const identifyPreviewImage = document.getElementById('preview-image');

        identifyInput.addEventListener('change', function () {
            const file = this.files && this.files[0];
            if (!file) {
                identifyPreviewBox.style.display = 'none';
                identifyPreviewImage.removeAttribute('src');
                return;
            }

            identifyPreviewImage.src = URL.createObjectURL(file);
            identifyPreviewBox.style.display = 'block';
        });
    </script>
</body>
</html>
