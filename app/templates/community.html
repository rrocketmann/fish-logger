<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Database - Fish Logger</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif; background-color: #fafffa; color: #1a3a1a; }
        .container { max-width: 1000px; margin: 0 auto; padding: 20px; }
        .title { text-align: center; font-size: 48px; font-weight: bold; color: #1a3a1a; margin: 40px 0; }
        .main-box { background-color: #e8f5e8; border: 3px solid #d4f1d4; padding: 30px; margin-bottom: 20px; }
        .fish-item { background: white; border: 2px solid #b8e6b8; padding: 15px; margin-bottom: 12px; display: grid; grid-template-columns: 140px 1fr; gap: 14px; align-items: start; }
        .fish-image { width: 140px; height: 100px; object-fit: cover; border: 2px solid #d4f1d4; background: #fafffa; }
        .fish-meta { line-height: 1.5; }
        .button-group { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        .btn-secondary { padding: 15px; background-color: #e8f5e8; border: 2px solid #b8e6b8; color: #1a3a1a; font-size: 16px; font-weight: 600; text-decoration: none; display: block; text-align: center; }
        .btn-secondary:hover { background-color: #b8e6b8; }
    </style>
</head>
<body>
    <div class="container">
        <h1 class="title">Fish Logger</h1>

        <div class="main-box">
            <h2 style="margin-bottom: 15px;">Submitted Database Entries</h2>
            {% if uploads and uploads.items %}
                {% for item in uploads.items %}
                    <div class="fish-item">
                        <img class="fish-image" src="{{ url_for('static', filename='uploads/' + item.filename) }}" alt="{{ item.species_label }} photo">
                        <div class="fish-meta">
                            <strong>Species:</strong> {{ item.species_label }}<br>
                            <strong>By:</strong> {{ item.uploader_name }}<br>
                            <strong>Location:</strong> {{ item.location or 'N/A' }}
                        </div>
                    </div>
                {% endfor %}
            {% else %}
                <p>No entries yet.</p>
            {% endif %}
        </div>

        <div class="button-group">
            <a href="{{ url_for('index') }}" class="btn-secondary">Back to Home</a>
            <a href="{{ url_for('upload') }}" class="btn-secondary">Submit Catch</a>
        </div>
    </div>
</body>
</html>
