services:
  - type: web
    name: fish-logger
    env: python
    healthCheckPath: /
    buildCommand: pip install -r requirements_web.txt
    startCommand: cd app && gunicorn --bind 0.0.0.0:$PORT app:app
    envVars:
      - key: PYTHON_VERSION
        value: 3.10.0
      - key: SECRET_KEY
        generateValue: true
